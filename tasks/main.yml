---
- name: Include install tasks
  ansible.builtin.include_tasks: "{{ ansible_facts['os_family'] | lower }}.yml"

# If grafana_user is defined, we assume non-standard dir paths
- name: Create Grafana directories
  when: grafana_user is defined
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ grafana_user }}"
    group: "{{ grafana_user }}"
    mode: "0750"
  loop:
    - "{{ grafana_conf_dir }}"
    - "{{ grafana_data_dir }}"
    - "{{ grafana_log_dir }}"

- name: Copy Grafana configs
  ansible.builtin.template:
    src: "{{ item }}.j2"
    dest: "{{ grafana_conf_dir }}/{{ item }}"
    # group: "{{ stats_grafana_group | default(omit) }}"  # TODO do we need this? If yes, what about # influxdb???
    mode: "0640"
    backup: "{{ grafana_backup_configs }}"
  loop:
    - grafana.ini
  notify:
    - Restart grafana

# Force a restart in case connection params have changed
- name: Flush handlers
  ansible.builtin.meta: flush_handlers

- name: Ensure Grafana is started and running
  ansible.builtin.systemd_service:
    name: "{{ grafana_service_name }}"
    state: started
    enabled: true

- name: Install Grafana plugins
  community.grafana.grafana_plugin:
    name: "{{ item }}"
  loop: "{{ grafana_plugins | default([]) }}"
